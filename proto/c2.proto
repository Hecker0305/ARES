syntax = "proto3";

package ares.c2.v1;

option go_package = "github.com/ares/engine/proto/c2/v1;c2v1";

// C2Service defines the command and control interface for agent communication
service C2Service {
  // Register a new agent session
  rpc Register(RegisterRequest) returns (RegisterResponse);

  // Heartbeat from agent to server
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);

  // Send command from server to agent
  rpc SendCommand(CommandRequest) returns (CommandResponse);

  // Stream command results from agent to server
  rpc StreamResults(stream ResultStream) returns (stream ResultAck);

  // Execute a command and return results (unary)
  rpc ExecuteCommand(ExecuteCommandRequest) returns (ExecuteCommandResponse);

  // List active sessions
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);

  // Terminate a session
  rpc TerminateSession(TerminateSessionRequest) returns (TerminateSessionResponse);

  // Upload file from agent to server
  rpc UploadFile(stream FileChunk) returns (UploadResponse);

  // Download file from server to agent
  rpc DownloadFile(DownloadRequest) returns (stream FileChunk);
}

// Agent registration
message RegisterRequest {
  string agent_id = 1;
  string hostname = 2;
  string os = 3;
  string arch = 4;
  string version = 5;
  repeated string capabilities = 6;
  map<string, string> metadata = 7;
}

message RegisterResponse {
  string session_id = 1;
  int64 heartbeat_interval = 2;
  string server_version = 3;
  repeated string available_commands = 4;
}

// Heartbeat
message HeartbeatRequest {
  string session_id = 1;
  int64 uptime_seconds = 2;
  SystemStats stats = 3;
  repeated string active_tasks = 4;
}

message HeartbeatResponse {
  bool alive = 1;
  repeated PendingCommand pending_commands = 2;
  int64 next_heartbeat = 3;
}

message SystemStats {
  float cpu_percent = 1;
  uint64 memory_used_mb = 2;
  uint64 memory_total_mb = 3;
  uint64 disk_used_gb = 4;
  uint64 disk_total_gb = 5;
  int32 active_connections = 6;
}

// Commands
message CommandRequest {
  string session_id = 1;
  string command_id = 2;
  string command_type = 3;
  bytes payload = 4;
  map<string, string> parameters = 5;
  int32 timeout_seconds = 6;
  bool requires_ack = 7;
}

message CommandResponse {
  string command_id = 1;
  bool accepted = 2;
  string error = 3;
}

message PendingCommand {
  string command_id = 1;
  string command_type = 2;
  bytes payload = 3;
  map<string, string> parameters = 4;
  int32 priority = 5;
}

// Results streaming
message ResultStream {
  string session_id = 1;
  string command_id = 2;
  bytes data = 3;
  bool is_complete = 4;
  int32 sequence = 5;
  string error = 6;
}

message ResultAck {
  string command_id = 1;
  bool received = 2;
  int32 sequence = 3;
}

// Execute command (unary)
message ExecuteCommandRequest {
  string session_id = 1;
  string command_type = 2;
  bytes payload = 3;
  map<string, string> parameters = 4;
  int32 timeout_seconds = 5;
}

message ExecuteCommandResponse {
  string command_id = 1;
  bytes output = 2;
  int32 exit_code = 3;
  string error = 4;
  int64 duration_ms = 5;
}

// Session management
message ListSessionsRequest {
  bool include_inactive = 1;
  int32 limit = 2;
}

message SessionInfo {
  string session_id = 1;
  string agent_id = 2;
  string hostname = 3;
  string os = 4;
  string arch = 5;
  string version = 6;
  int64 last_heartbeat = 7;
  bool is_active = 8;
  repeated string capabilities = 9;
}

message ListSessionsResponse {
  repeated SessionInfo sessions = 1;
  int32 total_count = 2;
}

message TerminateSessionRequest {
  string session_id = 1;
  bool force = 2;
}

message TerminateSessionResponse {
  bool terminated = 1;
  string error = 2;
}

// File transfer
message FileChunk {
  string session_id = 1;
  string file_id = 2;
  bytes data = 3;
  int32 chunk_index = 4;
  bool is_last = 5;
  int64 total_size = 6;
  string checksum = 7;
}

message UploadResponse {
  string file_id = 1;
  int64 total_bytes = 2;
  string checksum = 3;
  string storage_path = 4;
}

message DownloadRequest {
  string session_id = 1;
  string file_path = 2;
  int32 chunk_size = 3;
}

// Encryption envelope for secure communication
message EncryptedEnvelope {
  bytes ciphertext = 1;
  bytes nonce = 2;
  int64 timestamp = 3;
  string session_id = 4;
}

// Pivot request for lateral movement
message PivotRequest {
  string session_id = 1;
  string target_host = 2;
  int32 target_port = 3;
  string protocol = 4;
  bytes credentials = 5;
}

message PivotResponse {
  bool success = 1;
  string new_session_id = 2;
  string error = 3;
}
