linters:
  enable:
    - gofmt
    - govet
    - errcheck
    - staticcheck
    - gosimple
    - ineffassign
    - unused
    - misspell
    - revive
    - prealloc
    - unconvert
    - exportloopref
    - gosec
  disable:
    - scopelint

linters-settings:
  govet:
    check-shadowing: true
  errcheck:
    ignore: fmt:Fprintf,[Ww]rite[Ss]tring
  misspell:
    locale: US
  gosec:
    excludes:
      - G104

run:
  timeout: 5m
  tests: true
  skip-dirs:
    - vendor
    - internal/tools/skills/data

issues:
  max-issues-per-linter: 50
  max-same-issues: 10
